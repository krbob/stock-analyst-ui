name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Lint container files
        run: |
          docker run --rm -i hadolint/hadolint:latest hadolint --failure-threshold error - < Dockerfile
          docker run --rm -v "$PWD:/mnt" koalaman/shellcheck:stable docker-entrypoint.sh

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: stock-analyst-ui:test
          cache-from: type=gha,scope=stock-analyst-ui
          cache-to: type=gha,mode=max,scope=stock-analyst-ui

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Smoke test
        run: |
          if docker run --rm stock-analyst-ui:test; then
            echo "Container started without required API_URL"
            exit 1
          fi

          docker run -d --name ui -p 3000:8080 \
            -e API_URL=http://localhost:8080 \
            stock-analyst-ui:test
          trap 'docker rm -f ui >/dev/null 2>&1 || true' EXIT

          ready=0
          for i in $(seq 1 15); do
            if curl -sf http://localhost:3000/healthz > /dev/null 2>&1; then
              echo "Container is serving traffic"
              ready=1
              break
            fi
            sleep 1
          done
          if [ "$ready" -ne 1 ]; then
            docker logs ui
            exit 1
          fi

          curl -sf http://localhost:3000 | grep -q "Stock Analyst"
          BASE_URL=http://localhost:3000 npx playwright test e2e/offline.spec.ts
          echo "Smoke test passed"

  publish:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image metadata
        id: image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER}/stock-analyst-ui"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:${{ steps.image.outputs.sha_tag }}
            ${{ steps.image.outputs.image }}:latest
          cache-from: type=gha,scope=stock-analyst-ui
          cache-to: type=gha,mode=max,scope=stock-analyst-ui
