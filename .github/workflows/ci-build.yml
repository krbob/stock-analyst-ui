name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Lint container files
        run: |
          docker run --rm -i hadolint/hadolint:v2.14.0-alpine@sha256:7aba693c1442eb31c0b015c129697cb3b6cb7da589d85c7562f9deb435a6657c hadolint --failure-threshold error - < Dockerfile
          docker run --rm -v "$PWD:/mnt" koalaman/shellcheck:v0.11.0@sha256:61862eba1fcf09a484ebcc6feea46f1782532571a34ed51fedf90dd25f925a8d docker-entrypoint.sh

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.node-version'
          check-latest: false
          cache: 'npm'

      - name: Verify documentation contracts
        run: npm run docs:check

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Verify pinned supply chain
        run: npm run supply-chain:check

      - name: Audit npm dependencies
        run: npm audit --audit-level=high

      - name: Verify OpenAPI snapshot and generated client
        run: npm run contract:check

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run tests with all-source coverage
        run: npm run test:coverage

      - name: Publish coverage summary
        run: |
          set -o pipefail
          npm run --silent coverage:report | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-report
          path: coverage
          if-no-files-found: ignore
          retention-days: 14

      - name: Build Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          tags: stock-analyst-ui:test
          cache-from: type=gha,scope=stock-analyst-ui
          cache-to: type=gha,mode=max,scope=stock-analyst-ui

      - name: Generate image SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: stock-analyst-ui:test
          format: spdx-json
          output-file: stock-analyst-ui.spdx.json
          artifact-name: stock-analyst-ui-sbom
          upload-artifact: true
          upload-release-assets: false
          syft-version: v1.46.0

      - name: Gate actionable image vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: stock-analyst-ui:test
          version: v0.72.0
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL
          timeout: 15m

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Smoke test
        run: |
          if docker run --rm stock-analyst-ui:test; then
            echo "Container started without required API_URL"
            exit 1
          fi

          docker run -d --name ui -p 3000:8080 \
            -e API_URL=http://localhost:8080 \
            -e 'PORTFOLIO_URL=https://portfolio.example/app?tenant=personal' \
            stock-analyst-ui:test
          trap 'docker rm -f ui >/dev/null 2>&1 || true' EXIT

          ready=0
          for _ in $(seq 1 15); do
            if curl -sf http://localhost:3000/healthz > /dev/null 2>&1; then
              echo "Container is serving traffic"
              ready=1
              break
            fi
            sleep 1
          done
          if [ "$ready" -ne 1 ]; then
            docker logs ui
            exit 1
          fi

          curl -sf http://localhost:3000 | grep -q "Stock Analyst"
          curl -sSI http://localhost:3000/runtime-config.js | grep -qi 'Cache-Control:.*no-store'
          BASE_URL=http://localhost:3000 npm run test:e2e:ci
          echo "Smoke test passed"

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-traces
          path: test-results
          if-no-files-found: ignore
          retention-days: 14

  publish:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image metadata
        id: image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER}/stock-analyst-ui"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:${{ steps.image.outputs.sha_tag }}
            ${{ steps.image.outputs.image }}:latest
          cache-from: type=gha,scope=stock-analyst-ui
          cache-to: type=gha,mode=max,scope=stock-analyst-ui
          provenance: mode=max
          sbom: true
